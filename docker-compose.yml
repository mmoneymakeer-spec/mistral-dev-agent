version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - NODE_ENV=production
    volumes:
      - ./backend/workspace:/app/workspace
      - ./backend/memory.json:/app/memory.json
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=http://backend:4000/api/agent
    depends_on:
      - backend
    restart: unless-stopped
